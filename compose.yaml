services:
  postgres:
    image: postgres:16-alpine
    container_name: daily-ai-news-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: daily_ai_news
      POSTGRES_USER: daily_ai_news
      POSTGRES_PASSWORD: daily_ai_news
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U daily_ai_news -d daily_ai_news"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - daily_ai_news_postgres:/var/lib/postgresql/data

volumes:
  daily_ai_news_postgres:
