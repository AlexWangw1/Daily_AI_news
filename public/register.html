<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>注册 | AI 新闻与论文归档</title>
  <meta
    name="description"
    content="注册 AI 新闻与论文归档账号，保存个人阅读进度并解锁全部本地内容。"
  >
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;600;700&family=Noto+Sans+SC:wght@400;500;700;800&display=swap"
    rel="stylesheet"
  >
  <link rel="stylesheet" href="/styles.css">
</head>
<body class="auth-page" data-auth-page="register">
  <div class="auth-shell">
    <a class="brand-mark" href="/">
      <span class="brand-mark__pulse" aria-hidden="true"></span>
      <span class="brand-mark__text">AI 新闻与论文归档</span>
    </a>

    <main class="auth-layout">
      <section class="auth-copy">
        <p class="eyebrow">注册入口</p>
        <h1 class="auth-copy__title">创建独立账号，保存你的 AI 阅读进度。</h1>
        <p class="auth-copy__body" id="auth-page-body">
          注册后可解锁全部本地归档内容，并保存你的个人阅读进度。
        </p>
        <a class="ghost-button auth-copy__back" id="auth-back-link" href="/">返回首页</a>
      </section>

      <section class="auth-card">
        <div class="auth-card__header">
          <p class="eyebrow">账号创建</p>
          <h2 class="auth-card__title">注册账号</h2>
          <p class="auth-card__hint">
            已经有账号？
            <a class="auth-card__link" id="auth-switch-link" href="/login">去登录</a>
          </p>
        </div>

        <form class="auth-page-form" id="auth-page-form">
          <label class="auth-field">
            <span class="auth-field__label">显示名</span>
            <input class="auth-field__input" id="auth-name" type="text" maxlength="32" autocomplete="nickname" required>
          </label>
          <label class="auth-field">
            <span class="auth-field__label">邮箱</span>
            <input class="auth-field__input" id="auth-email" type="email" maxlength="160" autocomplete="email" required>
          </label>
          <label class="auth-field">
            <span class="auth-field__label">密码</span>
            <input class="auth-field__input" id="auth-password" type="password" autocomplete="new-password" required>
          </label>
          <label class="auth-field">
            <span class="auth-field__label">确认密码</span>
            <input class="auth-field__input" id="auth-confirm-password" type="password" autocomplete="new-password" required>
          </label>
          <button class="primary-button auth-form__submit" id="auth-submit-button" type="submit">创建账号</button>
        </form>

        <p class="auth-feedback" id="auth-page-feedback" aria-live="polite"></p>
      </section>
    </main>
  </div>

  <script type="module" src="/auth.js"></script>
</body>
</html>
